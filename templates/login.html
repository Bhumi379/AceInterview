<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login · AceInterview AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --cyan:#00f5ff;--purple:#a855f7;--pink:#f0abfc;
      --dark:#020817;--dark2:#080f1f;--dark3:#0d1530;
      --glass:rgba(255,255,255,0.04);--border:rgba(0,245,255,0.14);
      --text:#e2e8f0;--muted:#4a5568;--red:#ff4560;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--dark);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden;cursor:none;}

    #cur {position:fixed;width:10px;height:10px;background:var(--cyan);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--cyan),0 0 20px var(--cyan);}
    #ring{position:fixed;width:32px;height:32px;border:1.5px solid rgba(0,245,255,.35);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .25s,height .25s;}

    #bgc {position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.45;}
    .grid{position:fixed;inset:0;z-index:1;background-image:linear-gradient(rgba(0,245,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.018) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;}
    .scan{position:fixed;inset:0;z-index:2;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 4px);pointer-events:none;}

    /* Ambient glows */
    .glow-l{position:fixed;top:-10%;left:-10%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,245,255,.06),transparent 70%);pointer-events:none;z-index:1;}
    .glow-r{position:fixed;bottom:-10%;right:-10%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(168,85,247,.06),transparent 70%);pointer-events:none;z-index:1;}

    .page{position:relative;z-index:10;width:100%;max-width:460px;padding:24px;}

    /* Logo */
    .top-logo{text-align:center;margin-bottom:36px;animation:fadeUp .6s ease both;}
    .logo-link{font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
    .logo-sub{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:5px;}

    /* Card */
    .auth-card{
      background:var(--glass);
      border:1px solid var(--border);
      border-radius:20px;
      padding:40px 36px;
      position:relative;overflow:hidden;
      animation:fadeUp .6s .1s ease both;
    }
    .auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),var(--purple),transparent);}
    .auth-card::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(0,245,255,.04),transparent 60%);pointer-events:none;}

    .card-title{font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:900;color:#fff;margin-bottom:6px;}
    .card-sub  {font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--muted);letter-spacing:1.5px;margin-bottom:30px;}

    /* Error banner */
    .error-banner{
      display:flex;align-items:center;gap:10px;
      background:rgba(255,69,96,.1);border:1px solid rgba(255,69,96,.3);
      border-radius:8px;padding:12px 16px;margin-bottom:22px;
      font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--red);letter-spacing:1px;
      animation:shake .4s ease;
    }
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

    /* Form */
    .field{margin-bottom:20px;}
    .field-label{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;display:block;}
    .field-wrap{position:relative;}
    .field-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none;z-index:1;}
    .field input{
      width:100%;
      background:rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.08);
      border-radius:10px;
      padding:13px 14px 13px 42px;
      color:var(--text);
      font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:500;
      outline:none;transition:border-color .3s,box-shadow .3s;
      cursor:none;
    }
    .field input::placeholder{color:var(--muted);}
    .field input:focus{border-color:rgba(0,245,255,.4);box-shadow:0 0 0 3px rgba(0,245,255,.07);}

    /* Remember row */
    .remember-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
    .check-label{display:flex;align-items:center;gap:8px;cursor:none;font-size:.85rem;color:var(--muted);}
    .check-label input[type=checkbox]{width:16px;height:16px;accent-color:var(--cyan);cursor:none;}
    .forgot{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--cyan);letter-spacing:1px;text-decoration:none;transition:opacity .2s;}
    .forgot:hover{opacity:.7;}

    /* Submit */
    .btn-submit{
      width:100%;
      font-family:'Orbitron',monospace;font-size:.8rem;font-weight:800;
      letter-spacing:2px;text-transform:uppercase;
      padding:15px;
      background:linear-gradient(135deg,var(--cyan),var(--purple));
      color:var(--dark);border:none;border-radius:10px;cursor:none;
      transition:box-shadow .3s,transform .2s;
      box-shadow:0 0 28px rgba(0,245,255,.25);
      margin-bottom:20px;
    }
    .btn-submit:hover{box-shadow:0 0 48px rgba(0,245,255,.5),0 0 80px rgba(168,85,247,.2);transform:translateY(-2px);}

    /* Divider */
    .or-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
    .or-line{flex:1;height:1px;background:var(--border);}
    .or-txt{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:2px;}

    /* Signup link */
    .switch-row{text-align:center;font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--muted);letter-spacing:1px;}
    .switch-row a{color:var(--cyan);text-decoration:none;transition:opacity .2s;}
    .switch-row a:hover{opacity:.7;}

    /* Floating label animation on focus */
    .field input:focus + .field-focus-line{transform:scaleX(1);}
    .field-focus-line{display:block;height:1px;background:linear-gradient(90deg,var(--cyan),var(--purple));transform:scaleX(0);transform-origin:left;transition:transform .3s ease;margin-top:-1px;border-radius:0 0 10px 10px;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

    /* Password toggle */
    .toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:none;font-size:.9rem;color:var(--muted);transition:color .2s;z-index:2;background:none;border:none;padding:0;}
    .toggle-pw:hover{color:var(--cyan);}
    .field input.has-toggle{padding-right:42px;}
  </style>
</head>
<body>

<div id="cur"></div>
<div id="ring"></div>
<canvas id="bgc"></canvas>
<div class="grid"></div>
<div class="scan"></div>
<div class="glow-l"></div>
<div class="glow-r"></div>

<div class="page">

  <div class="top-logo">
    <a href="/" class="logo-link">AceInterview AI</a>
    <div class="logo-sub">Interview Intelligence Platform</div>
  </div>

  <div class="auth-card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to access your dashboard</div>

    {% if error %}
    <div class="error-banner">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">

      <div class="field">
        <label class="field-label" for="email">Email Address</label>
        <div class="field-wrap">
          <span class="field-icon">✉</span>
          <input type="email" id="email" name="email"
                 placeholder="you@example.com"
                 value="{{ form.get('email','') }}"
                 required autocomplete="email"/>
          <span class="field-focus-line"></span>
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="password">Password</label>
        <div class="field-wrap">
          <span class="field-icon">🔒</span>
          <input type="password" id="password" name="password"
                 placeholder="Enter your password"
                 class="has-toggle"
                 required autocomplete="current-password"/>
          <button type="button" class="toggle-pw" onclick="togglePw('password',this)">👁</button>
          <span class="field-focus-line"></span>
        </div>
      </div>

      <div class="remember-row">
        <label class="check-label">
          <input type="checkbox" name="remember"/>
          Remember me
        </label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>

      <button type="submit" class="btn-submit">Sign In →</button>

    </form>

    <div class="or-row">
      <div class="or-line"></div>
      <div class="or-txt">OR</div>
      <div class="or-line"></div>
    </div>

    <div class="switch-row">
      Don't have an account?&nbsp;
      <a href="/signup">Create one — it's free</a>
    </div>

  </div>
</div>

<script>
/* cursor */
const cur=document.getElementById('cur'),ring=document.getElementById('ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
(function ct(){cur.style.left=mx+'px';cur.style.top=my+'px';rx+=(mx-rx)*.14;ry+=(my-ry)*.14;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(ct);})();

/* particle bg */
const bc=document.getElementById('bgc'),bx=bc.getContext('2d');
let W,H;function rz(){W=bc.width=innerWidth;H=bc.height=innerHeight;}rz();window.addEventListener('resize',rz);
const pts=Array.from({length:40},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-.5)*.22,vy:(Math.random()-.5)*.22,r:Math.random()*1.3+.3,a:Math.random()*.3+.08,h:Math.random()>.5?185:270}));
(function loop(){bx.clearRect(0,0,W,H);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;bx.beginPath();bx.arc(p.x,p.y,p.r,0,Math.PI*2);bx.fillStyle=`hsla(${p.h},100%,65%,${p.a})`;bx.fill();});requestAnimationFrame(loop);})();

/* password toggle */
function togglePw(id,btn){
  const inp=document.getElementById(id);
  inp.type=inp.type==='password'?'text':'password';
  btn.textContent=inp.type==='password'?'👁':'🙈';
}
</script>
</body>
</html>
